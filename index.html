// ── Helpers ──────────────────────────────────────────────
function toDateStr(date){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }
function getLast7(){ return Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d; }); }
function weekOf(dateStr){ const d=new Date(dateStr+"T00:00:00"); d.setDate(d.getDate()-d.getDay()); return toDateStr(d); }
function isApplicable(h,date){ return !h.skipDays.includes(date.getDay()); }
function limitWeekCount(hid,ws,logs){ return Object.keys(logs).filter(k=>{ const [a,b]=k.split("|"); return a===hid&&b&&weekOf(b)===ws&&logs[k]; }).length; }
function weeklyGoalCount(hid,ws,logs){ return Object.keys(logs).filter(k=>{ const p=k.split("|"); return p[0]===hid&&p[1]&&p.length===2&&weekOf(p[1])===ws&&logs[k]; }).length; }
function isDone(hid,ds,logs){ return !!logs[`${hid}|${ds}`]; }
function isTwiceDone(hid,ds,s,logs){ return !!logs[`${hid}|${ds}|${s}`]; }

function goalStreak(hid,logs){
  let s=0; const t=new Date();
  for(let i=0;i<=120;i++){
    const d=new Date(t); d.setDate(d.getDate()-i); const ds=toDateStr(d);
    const h=DEFAULT_HABITS.find(x=>x.id===hid); if(!h) break;
    if(!isApplicable(h,d)) continue;
    if(h.twice){ if(logs[`${hid}|${ds}|m`]&&logs[`${hid}|${ds}|n`]) s++; else if(i>0) break; }
    else{ if(logs[`${hid}|${ds}`]) s++; else if(i>0) break; }
  }
  return s;
}
function perfectStreak(habits,logs){
  const t=new Date(); let s=0;
  for(let i=0;i<=365;i++){
    const d=new Date(t); d.setDate(d.getDate()-i); const ds=toDateStr(d);
    const ap=habits.filter(h=>h.type==="goal"&&isApplicable(h,d));
    if(!ap.length) continue;
    const ok=ap.every(h=>{ if(h.twice) return !!(logs[`${h.id}|${ds}|m`]&&logs[`${h.id}|${ds}|n`]); if(h.weeklyTarget) return weeklyGoalCount(h.id,weekOf(ds),logs)>=h.weeklyTarget||!!logs[`${h.id}|${ds}`]; return !!logs[`${h.id}|${ds}`]; });
    if(ok) s++; else if(i>0) break;
  }
  return s;
}
function getDayPct(date,habits,logs){
  const ds=toDateStr(date);
  const ap=habits.filter(h=>h.type==="goal"&&isApplicable(h,date));
  if(!ap.length) return null;
  const tot=ap.reduce((a,h)=>a+(h.twice?2:1),0);
  const done=ap.reduce((a,h)=>{ if(h.twice) return a+(logs[`${h.id}|${ds}|m`]?1:0)+(logs[`${h.id}|${ds}|n`]?1:0); if(h.weeklyTarget) return a+(weeklyGoalCount(h.id,weekOf(ds),logs)>=h.weeklyTarget||!!logs[`${h.id}|${ds}`]?1:0); return a+(logs[`${h.id}|${ds}`]?1:0); },0);
  return tot>0?done/tot:0;
}

// ── Energía helpers ────────────────────────────────────────
function pearson(xs, ys){
  const n = xs.length;
  if(n < 3) return null;
  const mx = xs.reduce((a,b)=>a+b,0)/n;
  const my = ys.reduce((a,b)=>a+b,0)/n;
  let num=0, dx2=0, dy2=0;
  for(let i=0;i<n;i++){ const dx=xs[i]-mx, dy=ys[i]-my; num+=dx*dy; dx2+=dx*dx; dy2+=dy*dy; }
  if(dx2===0||dy2===0) return null;
  return num/Math.sqrt(dx2*dy2);
}
function isHabitDoneOnDate(habit, ds, logs){
  if(habit.twice) return !!(logs[`${habit.id}|${ds}|m`] && logs[`${habit.id}|${ds}|n`]);
  return !!logs[`${habit.id}|${ds}`];
}
function sliderBg(color,val,min=1,max=10){
  const pct=((val-min)/(max-min))*100;
  return `linear-gradient(to right, ${color} 0%, ${color} ${pct}%, rgba(255,255,255,0.07) ${pct}%, rgba(255,255,255,0.07) 100%)`;
}

// ── .ics generator with time + alarm ─────────────────────
function buildICS(task, flashFn){
  const ds=task.date.replace(/-/g,"");
  const now=new Date().toISOString().replace(/[-:.]/g,"").slice(0,15)+"Z";
  let dtS, dtE;
  if(task.startTime){
    const [sh,sm]=task.startTime.split(":").map(Number);
    dtS=`${ds}T${String(sh).padStart(2,"0")}${String(sm).padStart(2,"0")}00`;
    if(task.endTime){ const [eh,em]=task.endTime.split(":").map(Number); dtE=`${ds}T${String(eh).padStart(2,"0")}${String(em).padStart(2,"0")}00`; }
    else{ dtE=`${ds}T${String(sh+1).padStart(2,"0")}${String(sm).padStart(2,"0")}00`; }
  }
  const allDay=!task.startTime;
  const lines=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Habitos//ES",
    "BEGIN:VEVENT",
    `UID:${task.id}@habitos`,`DTSTAMP:${now}`,
    allDay?`DTSTART;VALUE=DATE:${ds}`:`DTSTART;TZID=America/Argentina/Buenos_Aires:${dtS}`,
    allDay?`DTEND;VALUE=DATE:${ds}`:`DTEND;TZID=America/Argentina/Buenos_Aires:${dtE}`,
    `SUMMARY:${task.title}`,
    task.note?`DESCRIPTION:${task.note}`:"",
    task.reminderMin>0?["BEGIN:VALARM","ACTION:DISPLAY",`DESCRIPTION:Recordatorio: ${task.title}`,`TRIGGER:-PT${task.reminderMin}M`,"END:VALARM"].join("\r\n"):"",
    "END:VEVENT","END:VCALENDAR"
  ].filter(Boolean).join("\r\n");
  try {
    const blob=new Blob([lines],{type:"text/calendar;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="evento.ics"; a.style.display="none";
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    if(flashFn) flashFn("📅 Abrí el archivo para agregar al calendario");
  } catch(e){
    const uri="data:text/calendar;charset=utf8,"+encodeURIComponent(lines);
    window.open(uri,"_blank");
  }
}

    }catch{}
    return { metrics:{...ENERGY_DEFAULTS}, symptoms:[], note:"" };
  });

  const today=new Date(), todayStr=toDateStr(today), todayDow=today.getDay();
  const wkStart=weekOf(todayStr), days7=getLast7();
  const streak=perfectStreak(habits,logs);

  useEffect(()=>{ try{ localStorage.setItem("hab-logs-v3",JSON.stringify(logs)); }catch{} },[logs]);
  useEffect(()=>{ try{ localStorage.setItem("hab-list-v7",JSON.stringify(habits)); }catch{} },[habits]);
  useEffect(()=>{ try{ localStorage.setItem("hab-tasks-v1",JSON.stringify(tasks)); }catch{} },[tasks]);
  useEffect(()=>{ try{ localStorage.setItem("energia-checkins",JSON.stringify(energiaData)); }catch{} },[energiaData]);

  function flash(msg,ok=true){ setToast({msg,ok}); setTimeout(()=>setToast(null),2200); }
  function setLog(k,v){ setLogs(p=>({...p,[k]:v})); }

  // Habit CRUD
  const blankHabit = ()=>({ id:"h"+Date.now(), name:"", emoji:"⚡", color:G.teal, twice:false, skipDays:[], type:"goal", maxPerWeek:2, weeklyTarget:null, note:"" });
  function saveHabit(h){
    if(!h.name.trim()){ flash("Ponele un nombre",false); return; }
    if(editHabitId){ setHabits(p=>p.map(x=>x.id===editHabitId?{...x,...h}:x)); setEditHabitId(null); flash("Hábito actualizado ✓"); }
    else{ setHabits(p=>[...p,h]); setShowAddHabit(false); flash("Hábito agregado ✓"); }
  }
  function deleteHabit(id){ setHabits(p=>p.filter(x=>x.id!==id)); }

  // Toggles
  function toggleSingle(hid,ds){
    const h=habits.find(x=>x.id===hid); if(!h) return;
    const key=`${hid}|${ds}`; const next=!logs[key];
    if(h.type==="limit"&&next){ const cnt=limitWeekCount(hid,weekOf(ds),{...logs,[key]:true}); if(cnt>h.maxPerWeek){ flash(`⚠ Límite: máx ${h.maxPerWeek} días/sem`,false); return; } flash("Registrado ✓"); }
    else flash(next?"Completado ✓":"Desmarcado");
    setLog(key,next);
  }
  function toggleTwice(hid,ds,slot){ const key=`${hid}|${ds}|${slot}`; setLog(key,!logs[key]); flash(!logs[key]?(slot==="m"?"☀️ Mañana ✓":"🌙 Noche ✓"):"Desmarcado"); }

  // Tasks
  function openAddTask(){ setNewTask({title:"",date:todayStr,startTime:"",endTime:"",reminderMin:0,note:""}); setShowAddTask(true); }
  function addTask(){ if(!newTask.title.trim()) return; setTasks(p=>[...p,{id:"t"+Date.now(),...newTask,done:false}]); setShowAddTask(false); flash("Tarea agregada ✓"); }
  function toggleTask(id){ setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t)); }
  function deleteTask(id){ setTasks(p=>p.filter(t=>t.id!==id)); }

  function taskDateLabel(ds){
    if(ds===todayStr) return "Hoy";
    const tom=new Date(today); tom.setDate(tom.getDate()+1);
    if(ds===toDateStr(tom)) return "Mañana";
    const d=new Date(ds+"T00:00:00");
    return `${DAYS_ES[d.getDay()]} ${d.getDate()} ${MONTHS_ES[d.getMonth()]}`;
  }

  // ── Energía: check-in actions ──
  function setMetric(id,val){ setCheckinForm(p=>({...p,metrics:{...p.metrics,[id]:val}})); }
  function toggleSymptom(id){ setCheckinForm(p=>({...p,symptoms:p.symptoms.includes(id)?p.symptoms.filter(x=>x!==id):[...p.symptoms,id]})); }
  function saveCheckin(){
    setEnergiaData(p=>({...p,[todayStr]:{metrics:checkinForm.metrics,symptoms:checkinForm.symptoms,note:checkinForm.note}}));
    flash(energiaData[todayStr]?"Check-in actualizado ✓":"Check-in guardado ✓");
  }
  const hasCheckinToday = !!energiaData[todayStr];

  // ── Energía: correlations ──
  function computeCorrelations(){
    const entries=Object.values(energiaData).filter(e=>e&&e.metrics);
    const out=[];
    for(let i=0;i<METRICS.length;i++) for(let j=i+1;j<METRICS.length;j++){
      const a=METRICS[i], b=METRICS[j];
      const xs=[],ys=[];
      entries.forEach(e=>{ const x=e.metrics[a.id], y=e.metrics[b.id]; if(x!=null&&y!=null){xs.push(x);ys.push(y);} });
      const r=pearson(xs,ys);
      if(r!=null&&Math.abs(r)>=0.25) out.push({a,b,r,n:xs.length});
    }
    return out.sort((x,y)=>Math.abs(y.r)-Math.abs(x.r));
  }

  // ── Energía: habit impact ──
  function computeHabitImpacts(){
    const dates=Object.keys(energiaData);
    const out=[];
    habits.forEach(h=>{
      const done={},notd={};
      METRICS.forEach(m=>{done[m.id]=[];notd[m.id]=[];});
      dates.forEach(ds=>{
        const e=energiaData[ds]; if(!e?.metrics) return;
        const isDoneHabit=isHabitDoneOnDate(h,ds,logs);
        METRICS.forEach(m=>{ const v=e.metrics[m.id]; if(v==null) return; (isDoneHabit?done:notd)[m.id].push(v); });
      });
      const diffs={}; let maxAbs=0; let any=false;
      METRICS.forEach(m=>{
        const dv=done[m.id], nv=notd[m.id];
        if(dv.length>=2&&nv.length>=2){
          const avgD=dv.reduce((a,b)=>a+b,0)/dv.length, avgN=nv.reduce((a,b)=>a+b,0)/nv.length;
          const diff=avgD-avgN;
          diffs[m.id]={diff,doneN:dv.length,notN:nv.length};
          if(Math.abs(diff)>maxAbs) maxAbs=Math.abs(diff);
          any=true;
        }
      });
      if(any&&maxAbs>=0.3) out.push({habit:h,diffs,maxAbs});
    });
    return out.sort((a,b)=>b.maxAbs-a.maxAbs).slice(0,6);
  }

  // Progress
  const apGoals=habits.filter(h=>h.type==="goal"&&isApplicable(h,today));
  const totSlots=apGoals.reduce((a,h)=>a+(h.twice?2:1),0);
  const doneSlots=apGoals.reduce((a,h)=>{
    if(h.twice) return a+(logs[`${h.id}|${todayStr}|m`]?1:0)+(logs[`${h.id}|${todayStr}|n`]?1:0);
    if(h.weeklyTarget){ const wkc=weeklyGoalCount(h.id,wkStart,logs); return a+((wkc>=h.weeklyTarget||logs[`${h.id}|${todayStr}`])?1:0); }
    return a+(logs[`${h.id}|${todayStr}`]?1:0);
  },0);
  const pct=totSlots>0?Math.round(doneSlots/totSlots*100):0;
  const todaySkipped=habits.filter(h=>!isApplicable(h,today));
  const streakLabel=streak>=30?"🏆 Leyenda":streak>=14?"💎 Elite":streak>=7?"⚡ En racha":streak>0?"Construyendo":"—";

  // Task buckets
  const overdue=tasks.filter(t=>t.date<todayStr&&!t.done).sort((a,b)=>a.date.localeCompare(b.date));
  const todayP=tasks.filter(t=>t.date===todayStr&&!t.done);
  const todayD=tasks.filter(t=>t.date===todayStr&&t.done);
  const upcoming=tasks.filter(t=>t.date>todayStr&&!t.done).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);

  // Month calendar
  const dispDate=new Date(today.getFullYear(),today.getMonth()+monthOff,1);
  const dYear=dispDate.getFullYear(), dMonth=dispDate.getMonth();
  const daysInM=new Date(dYear,dMonth+1,0).getDate();
  const firstDow=new Date(dYear,dMonth,1).getDay();
  const mCells=[]; for(let i=0;i<firstDow;i++) mCells.push(null); for(let d=1;d<=daysInM;d++) mCells.push(d); while(mCells.length%7!==0) mCells.push(null);
  function cellBg(pct,fut){ if(fut||pct===null) return "rgba(14,24,34,0.5)"; if(pct===0) return "rgba(14,24,34,0.7)"; if(pct<0.5) return "rgba(0,201,167,0.18)"; if(pct<1) return "rgba(0,201,167,0.38)"; return G.teal; }

  // Task row
  function TaskRow({task,overdue:ov=false}){

      <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 14px",...cardStyle(false),borderRadius:18,marginBottom:7,border:`1px solid ${ov?"rgba(255,183,3,0.2)":"rgba(255,255,255,0.07)"}`}}>
        <button onClick={()=>toggleTask(task.id)} style={{marginTop:2,width:20,height:20,borderRadius:"50%",border:`2px solid ${task.done?G.teal:ov?G.gold:"rgba(255,255,255,0.2)"}`,background:task.done?"rgba(0,201,167,0.15)":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:G.teal,fontWeight:800}}>
          {task.done?"✓":""}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,color:task.done?"rgba(255,255,255,0.3)":G.text,textDecoration:task.done?"line-through":"none"}}>{task.title}</div>
          {(timeLabel||ov)&&<div style={{fontSize:11,color:ov?G.gold:G.sub,marginTop:3}}>{ov?`Venció el ${taskDateLabel(task.date)}`:`⏰ ${timeLabel}`}</div>}
          {task.note&&<div style={{fontSize:11,color:G.sub,marginTop:2}}>{task.note}</div>}
        </div>
        <button onClick={()=>buildICS(task,flash)} title="Guardar en calendario" style={{background:"none",border:"none",cursor:"pointer",fontSize:15,color:G.sub,padding:"2px 3px"}}>📅</button>
        <button onClick={()=>deleteTask(task.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:17,color:G.dim,padding:"2px 3px",lineHeight:1}}>×</button>
      </div>
    );
  }

  // Main render
  return(
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",minHeight:"100vh",background:`radial-gradient(ellipse 100% 45% at 50% -8%, rgba(0,201,167,0.05) 0%, transparent 45%), radial-gradient(ellipse 80% 35% at 90% 0%, rgba(79,142,247,0.035) 0%, transparent 40%), linear-gradient(180deg, #08090B 0%, ${G.bg} 30%)`,color:G.text,maxWidth:430,margin:"0 auto",paddingBottom:106}}>

      {/* ═══ HEADER ═══ */}
      <div style={{padding:"36px 20px 22px",background:"linear-gradient(180deg,rgba(20,22,42,0.7) 0%,transparent 100%)",backdropFilter:G.blur,WebkitBackdropFilter:G.blur}}>
        <div style={{fontSize:10,letterSpacing:4,color:G.sub,textTransform:"uppercase",marginBottom:14}}>
          {DAYS_FULL[todayDow]} · {today.getDate()} {MONTHS_ES[today.getMonth()]} {today.getFullYear()}
        </div>
        <div style={{marginBottom:22,position:"relative"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontFamily:"'Plus Jakarta Sans','DM Sans',sans-serif",fontSize:32,fontWeight:800,letterSpacing:-0.5,lineHeight:1,
              background:"linear-gradient(160deg,#ffffff 0%,#ffffff 60%,rgba(255,255,255,0.7) 100%)",
              WebkitBackgroundClip:"text",backgroundClip:"text",color:"transparent",
              textShadow:`0 0 90px ${G.tealGlow}, 0 0 36px rgba(79,142,247,0.16)`,
              filter:"drop-shadow(0 2px 10px rgba(0,0,0,0.45))"
            }}>Bull Tracker</div>
            <span style={{fontSize:28,filter:`drop-shadow(0 0 10px ${G.tealGlow})`}}>🐃</span>
          </div>
          <div style={{width:40,height:3,marginTop:10,background:`linear-gradient(90deg,${G.teal},${G.blue},transparent)`,borderRadius:2,boxShadow:`0 0 12px ${G.tealGlow}`}}/>
        </div>

        {/* Hero card: big gradient ring + streak */}
        <div style={{...cardStyle(true),borderRadius:30,padding:"22px 20px",display:"flex",alignItems:"center",gap:18,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:`radial-gradient(circle, ${G.tealGlow} 0%, transparent 70%)`,pointerEvents:"none"}}/>
          <div style={{position:"relative",width:84,height:84,flexShrink:0}}>
            <svg width="84" height="84" style={{transform:"rotate(-90deg)"}}>
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor={G.teal}/>
                  <stop offset="100%" stopColor={G.blue}/>
                </linearGradient>
              </defs>
              <circle cx="42" cy="42" r="35" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="7"/>
              <circle cx="42" cy="42" r="35" fill="none" stroke="url(#ringGrad)" strokeWidth="7" strokeDasharray={`${2*Math.PI*35}`} strokeDashoffset={`${2*Math.PI*35*(1-pct/100)}`} strokeLinecap="round" style={{transition:"stroke-dashoffset .6s", filter:`drop-shadow(0 0 10px ${G.tealGlow})`}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:19,fontWeight:900,color:"#fff",lineHeight:1}}>{pct}%</span>
            </div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,letterSpacing:2,color:G.sub,textTransform:"uppercase",marginBottom:4,fontWeight:600}}>Progreso de hoy</div>
            <div style={{fontWeight:800,fontSize:16,color:"#fff",marginBottom:6}}>{pct===100?"¡Día completo! 🔥":pct>=50?"Vas bien":"Empecemos"}</div>
            <div style={{fontSize:12,color:G.sub}}>{doneSlots}/{totSlots} hábitos</div>
          </div>
          <div style={{width:1,alignSelf:"stretch",background:"rgba(255,255,255,0.1)"}}/>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,minWidth:54}}>
            <span style={{fontSize:18}}>🔥</span>
            <div style={{fontSize:24,fontWeight:900,color:streak>0?G.gold:G.dim,lineHeight:1}}>{streak}</div>
            <div style={{fontSize:8,letterSpacing:0.5,color:G.sub,textTransform:"uppercase",textAlign:"center",marginTop:2}}>días</div>
          </div>
        </div>
      </div>

      {/* ═══════ HOY ═══════ */}
      {view==="today"&&(
        <div style={{padding:"16px"}}>
          {habits.map(habit=>{
            if(!isApplicable(habit,today)) return null;
            const sd=!habit.twice&&isDone(habit.id,todayStr,logs);
            const md=habit.twice&&isTwiceDone(habit.id,todayStr,"m",logs);
            const nd=habit.twice&&isTwiceDone(habit.id,todayStr,"n",logs);
            const full=habit.twice?(md&&nd):sd; const half=habit.twice&&(md||nd)&&!(md&&nd);
            const wkc=habit.type==="limit"?limitWeekCount(habit.id,wkStart,logs):0;
            const over=habit.type==="limit"&&wkc>habit.maxPerWeek;
            const hs=habit.type==="goal"&&!habit.twice&&!habit.weeklyTarget?goalStreak(habit.id,logs):0;
            const wkg=habit.weeklyTarget?weeklyGoalCount(habit.id,wkStart,logs):0;
            const wm=!!(habit.weeklyTarget&&wkg>=habit.weeklyTarget);
            const lit=full||half||wm; const ac=over?G.danger:habit.color;
            return(
              <div key={habit.id} style={{...cardStyle(lit,habit.color),borderRadius:22,padding:"15px",marginBottom:10,transition:"all .25s"}}>
                <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:habit.twice?12:0}}>
                  <div style={{width:44,height:44,borderRadius:18,flexShrink:0,background:lit?`${ac}22`:"rgba(255,255,255,0.04)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:`1px solid ${lit?ac+"44":"rgba(255,255,255,0.08)"}`,transition:"all .2s"}}>{habit.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{habit.name}</div>
                    <div style={{fontSize:11,color:G.sub}}>{habit.note}</div>
                  </div>
                  {habit.type==="limit"&&(<div style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:26,background:over?"rgba(239,71,111,0.15)":"rgba(255,255,255,0.06)",color:over?G.danger:wkc>=habit.maxPerWeek?G.gold:G.sub,border:`1px solid ${over?"rgba(239,71,111,0.3)":"rgba(255,255,255,0.1)"}`}}>{wkc}/{habit.maxPerWeek}</div>)}
                  {habit.weeklyTarget&&(<div style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:26,background:wm?`${ac}22`:"rgba(255,255,255,0.06)",color:wm?ac:G.sub,border:`1px solid ${wm?ac+"44":"rgba(255,255,255,0.1)"}`}}>{wkg}/{habit.weeklyTarget} sem</div>)}
                  {habit.type==="goal"&&!habit.twice&&!habit.weeklyTarget&&hs>1&&(<div style={{fontSize:11,color:G.sub}}>🔥{hs}d</div>)}
                </div>
                {habit.twice&&(
                  <div style={{display:"flex",gap:8}}>
                    {[["m","☀️ Mañana",md],["n","🌙 Noche",nd]].map(([sl,lb,done])=>(
                      <button key={sl} onClick={()=>toggleTwice(habit.id,todayStr,sl)} style={{flex:1,padding:"9px 8px",borderRadius:14,cursor:"pointer",background:done?`${ac}22`:"rgba(255,255,255,0.04)",border:`1px solid ${done?ac+"55":"rgba(255,255,255,0.08)"}`,color:done?ac:G.sub,fontSize:13,fontWeight:600,transition:"all .2s"}}>{lb}{done?" ✓":""}</button>
                    ))}
                  </div>
                )}
                {!habit.twice&&(
                  <button onClick={()=>toggleSingle(habit.id,todayStr)} style={{width:"100%",marginTop:12,padding:"10px",borderRadius:14,cursor:"pointer",background:(sd||wm)?`${ac}22`:"rgba(255,255,255,0.04)",border:`1px solid ${(sd||wm)?ac+"55":"rgba(255,255,255,0.08)"}`,color:(sd||wm)?ac:G.sub,fontSize:13,fontWeight:600,transition:"all .2s"}}>
                    {habit.type==="limit"?(sd?"✓ Registrado — toca para desmarcar":"Registrar para hoy"):habit.weeklyTarget?(wm&&!sd?"✓ Meta semanal cumplida":sd?"✓ Hecho hoy — toca para desmarcar":"Marcar como hecho"):(sd?"✓ Completado — toca para desmarcar":"Marcar como hecho")}
                  </button>
                )}
              </div>
            );
          })}
          {todaySkipped.length>0&&(
            <div style={{marginTop:14}}>
              <div style={{fontSize:10,letterSpacing:3,color:G.dim,textTransform:"uppercase",marginBottom:8}}>No aplica hoy</div>
              {todaySkipped.map(h=>(<div key={h.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"rgba(14,24,34,0.4)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:18,marginBottom:6,opacity:0.4}}><span style={{fontSize:17}}>{h.emoji}</span><span style={{fontSize:13,color:G.sub}}>{h.name}</span><span style={{marginLeft:"auto",fontSize:11,color:G.dim}}>{h.note}</span></div>))}
            </div>
          )}

          {/* ═══ TAREAS ═══ */}
          <div style={{marginTop:24,borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:10,letterSpacing:3,color:G.sub,textTransform:"uppercase"}}>Tareas</div>
              
            </div>
            {overdue.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:9,letterSpacing:2,color:G.gold,textTransform:"uppercase",marginBottom:8}}>⚠ Vencidas</div>{overdue.map(t=><TaskRow key={t.id} task={t} overdue={true}/>)}</div>}
            {todayP.map(t=><TaskRow key={t.id} task={t}/>)}
            {todayD.map(t=><TaskRow key={t.id} task={t}/>)}
            {overdue.length===0&&todayP.length===0&&todayD.length===0&&(<div style={{textAlign:"center",color:G.dim,fontSize:13,padding:"14px 0"}}>Sin tareas para hoy</div>)}
            {upcoming.length>0&&(
              <div style={{marginTop:14}}>
                <div style={{fontSize:9,letterSpacing:2,color:G.dim,textTransform:"uppercase",marginBottom:8}}>Próximas</div>
                {upcoming.map(t=>(
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",background:"rgba(14,24,34,0.5)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:14,marginBottom:5}}>
                    <div style={{fontSize:10,color:G.sub,minWidth:64,flexShrink:0}}>{taskDateLabel(t.date)}</div>
                    {t.startTime&&<div style={{fontSize:10,color:G.dim,flexShrink:0}}>⏰{t.startTime}</div>}
                    <div style={{flex:1,fontSize:13,color:"rgba(255,255,255,0.4)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                    <button onClick={()=>deleteTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:G.dim,padding:"2px"}}>×</button>
                  </div>
                ))}
              </div>
            )}
            {/* Add task form */}
            {showAddTask&&(
              <div style={{background:"rgba(8,14,20,0.94)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:30,padding:"22px 16px 16px",marginTop:12,boxShadow:"0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08)"}}>
                <div style={{width:36,height:4,background:"rgba(255,255,255,0.12)",borderRadius:2,margin:"0 auto 18px"}}/>
                <div style={{fontWeight:800,fontSize:11,color:G.gold,letterSpacing:3,textTransform:"uppercase",marginBottom:20,textAlign:"center"}}>Nueva tarea</div>
                <div style={{marginBottom:10}}><input placeholder="¿Qué tenés que hacer?" value={newTask.title} onChange={e=>setNewTask(p=>({...p,title:e.target.value}))} style={IS} autoFocus/></div>

                      if(habit.twice){ const m=isTwiceDone(habit.id,ds,"m",logs),n=isTwiceDone(habit.id,ds,"n",logs); return(<div key={i} style={{height:34,borderRadius:12,overflow:"hidden",display:"flex",flexDirection:"column",gap:1,cursor:"pointer",border:`1px solid ${(m||n)?habit.color+"44":"rgba(255,255,255,0.07)"}`}} onClick={()=>{ if(!m&&!n){setLog(`${habit.id}|${ds}|m`,true);flash("Mañana ✓");}else if(m&&!n){setLog(`${habit.id}|${ds}|n`,true);flash("Noche ✓");}else{setLog(`${habit.id}|${ds}|m`,false);setLog(`${habit.id}|${ds}|n`,false);flash("Desmarcado");} }}><div style={{flex:1,background:m?`${habit.color}50`:"rgba(14,24,34,0.6)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,color:m?habit.color:G.dim}}>☀</span></div><div style={{flex:1,background:n?`${habit.color}50`:"rgba(14,24,34,0.6)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,color:n?habit.color:G.dim}}>🌙</span></div></div>); }
                      const done=isDone(habit.id,ds,logs);

                  else{ const ap=days7.filter(d=>isApplicable(habit,d)); target=ap.length; done=ap.filter(d=>logs[`${habit.id}|${toDateStr(d)}`]).length; p=target>0?done/target:0; label=`${done}/${target} días`; }
                  const barColor=habit.type==="limit"&&done>target?G.danger:p===1?G.teal:habit.color;

              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
                {DAYS_ES.map(d=>(<div key={d} style={{textAlign:"center",fontSize:9,letterSpacing:1,color:G.sub,textTransform:"uppercase",padding:"4px 0"}}>{d}</div>))}

              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:16}}>
                {(()=>{ let pf=0,pa=0,z=0; for(let d=1;d<=daysInM;d++){ const dt=new Date(dYear,dMonth,d); if(dt>today) continue; const p=getDayPct(dt,habits,logs); if(p===null) continue; if(p===1) pf++; else if(p>0) pa++; else z++; } return(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{[["✅","Completos",pf,G.teal],["⚡","Parciales",pa,G.gold],["○","Sin marcar",z,G.sub]].map(([icon,l,v,c])=>(<div key={l} style={{...cardStyle(false),borderRadius:18,padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:18,marginBottom:4}}>{icon}</div><div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:10,color:G.sub,marginTop:2}}>{l}</div></div>))}</div>); })()}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ═══════ ENERGÍA ═══════ */}
      {view==="energia"&&(()=>{
        const last30 = Array.from({length:30},(_,i)=>{ const d=new Date(today); d.setDate(d.getDate()-(29-i)); return toDateStr(d); });
        const chartW=300, chartH=110, pad=6;
        function pointsFor(metricId){
          return last30.map((ds,i)=>{
            const v = energiaData[ds]?.metrics?.[metricId];
            if(v==null) return null;
            return { x: pad+(i/(last30.length-1))*(chartW-2*pad), y: chartH-pad-((v-1)/9)*(chartH-2*pad) };
          });
        }
        function buildPath(pts){
          let d=""; let started=false;
          pts.forEach(p=>{ if(!p){ started=false; return; } d += (started?"L":"M")+p.x.toFixed(1)+","+p.y.toFixed(1)+" "; started=true; });
          return d.trim();
        }
        const chartMetrics=[{id:"sueno",color:"#7B9EE8",label:"Sueño"},{id:"animo",color:"#FFB703",label:"Ánimo"},{id:"energia",color:"#00C9A7",label:"Energía"}];
        const totalCheckins = Object.keys(energiaData).length;
        const correlations = energiaSub==="insights" ? computeCorrelations() : [];
        const impacts = energiaSub==="insights" ? computeHabitImpacts() : [];
        const sortedDates = energiaSub==="historial" ? Object.keys(energiaData).sort((a,b)=>b.localeCompare(a)) : [];
        const dotHabits = habits.filter(h=>["minoxidil","gimnasio","alcohol","bici","agua","sueno"].includes(h.id));

        return(

              <button key={v} onClick={()=>setEnergiaSub(v)} style={{flex:1,padding:"9px 4px",borderRadius:14,cursor:"pointer",...cardStyle(energiaSub===v),color:energiaSub===v?G.teal:G.sub,fontSize:12,fontWeight:energiaSub===v?700:400,border:`1px solid ${energiaSub===v?G.tealBorder:"rgba(255,255,255,0.07)"}`}}>{l}</button>
            ))}

          {energiaSub==="checkin"&&(

              {hasCheckinToday&&(
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"rgba(0,201,167,0.08)",border:`1px solid ${G.tealBorder}`,borderRadius:18,marginBottom:14,fontSize:12,color:G.teal}}>

                <textarea value={checkinForm.note} onChange={e=>setCheckinForm(p=>({...p,note:e.target.value}))} placeholder="¿Algo que quieras anotar sobre hoy?" style={{...IS,minHeight:64,resize:"vertical",fontFamily:"inherit"}}/>

                      {chartMetrics.map(cm=>(
                        <path key={cm.id} d={buildPath(pointsFor(cm.id))} fill="none" stroke={cm.color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{filter:`drop-shadow(0 0 4px ${cm.color}66)`}}/>

                      <div key={m.id} style={{marginBottom:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>

                        </div>
                        <div style={{position:"relative",height:6,background:"rgba(255,255,255,0.06)",borderRadius:3}}>
                          <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:"rgba(255,255,255,0.15)"}}/>
                          <div style={{position:"absolute",top:0,bottom:0,left:pos?"50%":`${50-pct}%`,width:`${pct}%`,background:barColor,borderRadius:3}}/>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{fontSize:9,color:G.dim,marginTop:6}}>Días con vs. sin {habit.name.toLowerCase()}</div>
                </div>
              ))}
            </div>
          )}

          {/* ── HISTORIAL ── */}
          {energiaSub==="historial"&&(
            <div>
              {sortedDates.length===0?(
                <div style={{...cardStyle(false),borderRadius:20,padding:"24px",textAlign:"center",color:G.dim,fontSize:13}}>Todavía no registraste ningún check-in</div>
              ):sortedDates.map(ds=>{
                const entry=energiaData[ds];
                return(
                  <div key={ds} style={{...cardStyle(false),borderRadius:22,padding:"14px 16px",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <span style={{fontWeight:700,fontSize:13}}>{taskDateLabel(ds)}</span>
                      <div style={{display:"flex",gap:4}}>
                        {dotHabits.map(h=>(<span key={h.id} title={h.name} style={{width:7,height:7,borderRadius:"50%",background:isHabitDoneOnDate(h,ds,logs)?h.color:"rgba(255,255,255,0.08)"}}/>))}
                      </div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",gap:4}}>
                      {METRICS.map(m=>{ const v=entry.metrics?.[m.id]??0; return(
                        <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1}}>
                          <div style={{fontSize:12}}>{m.emoji}</div>
                          <div style={{width:13,height:46,background:"rgba(255,255,255,0.06)",borderRadius:9,display:"flex",alignItems:"flex-end",overflow:"hidden"}}>
                            <div style={{width:"100%",height:`${v*10}%`,background:m.color,borderRadius:9,transition:"height .2s"}}/>
                          </div>
                          <div style={{fontSize:9,color:G.sub}}>{v}</div>
                        </div>
                      );})}
                    </div>
                    {entry.symptoms?.length>0&&(
                      <div style={{marginTop:11,display:"flex",flexWrap:"wrap",gap:5}}>
                        {entry.symptoms.map(sid=>{ const s=SYMPTOMS.find(x=>x.id===sid); return s?(<span key={sid} style={{fontSize:10,padding:"3px 9px",borderRadius:14,background:"rgba(255,255,255,0.04)",color:G.sub}}>{s.emoji} {s.label}</span>):null; })}
                      </div>
                    )}
                    {entry.note&&(<div style={{marginTop:9,fontSize:11,color:G.sub,fontStyle:"italic"}}>"{entry.note}"</div>)}
                  </div>
                );
              })}
            </div>
          )}
        </div>
        );
      })()}

      {/* ═══════ EDITAR ═══════ */}
      {view==="manage"&&(
        <div style={{padding:"16px"}}>
          {habits.map(h=>(
            <div key={h.id}>
              {editHabitId===h.id?(
                <HabitForm initial={h} title="EDITAR HÁBITO" onSave={saveHabit} onCancel={()=>setEditHabitId(null)}/>
              ):(
                <div style={{...cardStyle(false),borderLeft:`3px solid ${h.type==="goal"?h.color:G.danger}`,borderRadius:18,padding:"13px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:20}}>{h.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{h.name}</div>
                    <div style={{fontSize:11,color:G.sub,marginTop:2}}>{h.note}</div>
                  </div>
                  <div style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:14,letterSpacing:1,background:h.type==="goal"?"rgba(0,201,167,0.1)":"rgba(239,71,111,0.1)",color:h.type==="goal"?G.teal:G.danger,border:`1px solid ${h.type==="goal"?"rgba(0,201,167,0.2)":"rgba(239,71,111,0.2)"}`}}>{h.type==="goal"?"META":"LÍMITE"}</div>
                  <button onClick={()=>{ setEditHabitId(h.id); }} title="Editar" style={{background:"rgba(0,201,167,0.08)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:14,color:G.teal,cursor:"pointer",fontSize:14,padding:"6px 10px"}}>✏</button>
                  <button onClick={()=>deleteHabit(h.id)} style={{background:"none",border:"none",color:G.dim,cursor:"pointer",fontSize:20,lineHeight:1,padding:4}}>×</button>
                </div>
              )}
            </div>
          ))}
          {!showAddHabit?(
            <button onClick={()=>setShowAddHabit(true)} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"2px dashed rgba(255,255,255,0.1)",borderRadius:18,padding:18,color:G.sub,cursor:"pointer",fontSize:14,marginTop:4}}>+ Agregar hábito</button>
          ):(
            <HabitForm initial={blankHabit()} title="NUEVO HÁBITO" onSave={saveHabit} onCancel={()=>setShowAddHabit(false)}/>
          )}
        </div>
      )}

      {/* Toast */}
      {toast&&(<div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:toast.ok?"rgba(0,201,167,0.15)":"rgba(239,71,111,0.15)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:`1px solid ${toast.ok?G.tealBorder:"rgba(239,71,111,0.3)"}`,color:toast.ok?G.teal:G.danger,padding:"10px 22px",borderRadius:30,fontSize:13,fontWeight:600,whiteSpace:"nowrap",zIndex:200,boxShadow:"0 8px 32px rgba(0,0,0,0.6)"}}>{toast.msg}</div>)}

      {/* ── FAB ── */}
      {showFAB&&<div onClick={()=>setShowFAB(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",zIndex:140}}/>}
      <div style={{position:"fixed",bottom:94,right:16,zIndex:150,display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
        {showFAB&&(
          <div style={{background:"rgba(10,18,26,0.92)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:"1px solid rgba(255,255,255,0.11)",borderRadius:34,padding:"20px 16px 16px",marginBottom:14,width:270,boxShadow:"0 24px 64px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.1)"}}>
            {/* Handle */}
            <div style={{width:36,height:4,background:"rgba(255,255,255,0.15)",borderRadius:2,margin:"0 auto 18px",flexShrink:0}}/>
            <div style={{fontSize:9,letterSpacing:3,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",marginBottom:14,textAlign:"center"}}>Agregar nuevo</div>

            {/* Habit option */}
            <button onClick={()=>{ setShowFAB(false); setView("manage"); setShowAddHabit(true); setEditHabitId(null); }} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 14px",background:"linear-gradient(135deg,rgba(0,201,167,0.13) 0%,rgba(0,180,216,0.07) 100%)",border:"1px solid rgba(0,201,167,0.22)",borderRadius:24,cursor:"pointer",marginBottom:10,textAlign:"left",boxShadow:"inset 0 1px 0 rgba(0,201,167,0.15), 0 2px 12px rgba(0,201,167,0.08)"}}>
              <div style={{width:44,height:44,borderRadius:20,background:"rgba(0,201,167,0.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:"1px solid rgba(0,201,167,0.25)",flexShrink:0}}>🔄</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:G.teal,marginBottom:2}}>Hábito recurrente</div>
                <div style={{fontSize:11,color:G.sub,lineHeight:1.3}}>Diario, semanal, con frecuencia</div>
              </div>
              <div style={{color:"rgba(0,201,167,0.35)",fontSize:18,fontWeight:300}}>›</div>
            </button>

            {/* Task option */}
            <button onClick={()=>{ setShowFAB(false); setView("today"); openAddTask(); }} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 14px",background:"linear-gradient(135deg,rgba(255,183,3,0.11) 0%,rgba(255,140,0,0.06) 100%)",border:"1px solid rgba(255,183,3,0.2)",borderRadius:24,cursor:"pointer",textAlign:"left",boxShadow:"inset 0 1px 0 rgba(255,183,3,0.12), 0 2px 12px rgba(255,183,3,0.06)"}}>
              <div style={{width:44,height:44,borderRadius:20,background:"rgba(255,183,3,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:"1px solid rgba(255,183,3,0.22)",flexShrink:0}}>📋</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:G.gold,marginBottom:2}}>Tarea / Recordatorio</div>
                <div style={{fontSize:11,color:G.sub,lineHeight:1.3}}>Una vez, fecha y hora específica</div>
              </div>
              <div style={{color:"rgba(255,183,3,0.35)",fontSize:18,fontWeight:300}}>›</div>
            </button>
          </div>
        )}

        {/* FAB button */}
        <button onClick={()=>setShowFAB(!showFAB)} style={{width:56,height:56,borderRadius:"50%",background:showFAB?"rgba(255,255,255,0.08)":`linear-gradient(145deg,${G.teal} 0%,${G.blue} 100%)`,border:showFAB?"1px solid rgba(255,255,255,0.15)":"none",cursor:"pointer",color:"#fff",boxShadow:showFAB?"0 4px 20px rgba(0,0,0,0.5)":`0 6px 28px rgba(0,201,167,0.5), 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.35)`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s",backdropFilter:showFAB?"blur(16px)":"none",WebkitBackdropFilter:showFAB?"blur(16px)":"none"}}>
          <span style={{fontSize:24,fontWeight:300,lineHeight:1,display:"block",transform:showFAB?"rotate(45deg)":"rotate(0deg)",transition:"transform .25s"}}>{showFAB?"✕":"+"}</span>
        </button>
      </div>

      {/* Bottom nav — floating Liquid Glass pill */}
      <div style={{position:"fixed",bottom:18,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:398,zIndex:130}}>
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",background:"rgba(14,22,30,0.65)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:32,padding:"7px",boxShadow:"0 16px 48px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.2)"}}>
          {[["today","📅","Hoy"],["week","📊","Historial"],["energia","⚡","Energía"],["manage","⚙️","Editar"]].map(([v,icon,l])=>{
            const active = view===v;
            return(
              <button key={v} onClick={()=>setView(v)} style={{position:"relative",background:active?`linear-gradient(160deg,rgba(0,201,167,0.22),rgba(0,180,216,0.1))`:"none",border:active?"1px solid rgba(0,201,167,0.25)":"1px solid transparent",borderRadius:22,cursor:"pointer",color:active?G.teal:"rgba(255,255,255,0.4)",display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"8px 4px",flex:1,transition:"all .25s",boxShadow:active?"inset 0 1px 0 rgba(0,201,167,0.15), 0 2px 10px rgba(0,201,167,0.12)":"none"}}>
                <span style={{fontSize:19,filter:active?`drop-shadow(0 0 6px ${G.tealGlow})`:"",transition:"all .25s"}}>{icon}</span>
                <span style={{fontSize:9.5,fontWeight:active?700:500,letterSpacing:0.2}}>{l}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}


const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
