<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Hábitos"/>
  <meta name="theme-color" content="#080D10"/>
  <title>MIS HÁBITOS</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #080D10; overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
    input, button { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap');
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DAYS_ES   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DAYS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// KEY FORMAT:
//   single  →  "{habitId}|{YYYY-MM-DD}"
//   twice   →  "{habitId}|{YYYY-MM-DD}|m"  /  "{habitId}|{YYYY-MM-DD}|n"
// weeklyTarget: number → habit tracked X times/week on any days user picks

const HABITS = [
  { id:"hipopresivos", name:"Hipopresivos",        emoji:"🧘", color:"#00C9A7", twice:false, skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"En ayunas al levantarte"        },
  { id:"gimnasio",     name:"Gimnasio",             emoji:"🏋️", color:"#00B4D8", twice:false, skipDays:[0],           type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"Lunes a sábado"                 },
  { id:"minoxidil",    name:"Minoxidil",            emoji:"💧", color:"#48CAE4", twice:true,  skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"Mañana y noche"                 },
  { id:"dientes",      name:"Lavado de dientes",    emoji:"🦷", color:"#90E0EF", twice:true,  skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"Mañana y noche"                 },
  { id:"bicarbonato",  name:"Bicarbonato",          emoji:"✨", color:"#00C9A7", twice:false, skipDays:[0,1,2,3,4,6], type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"Solo los viernes"               },
  { id:"alcohol",      name:"Alcohol",              emoji:"🍺", color:"#EF476F", twice:false, skipDays:[],            type:"limit", maxPerWeek:2,    weeklyTarget:null, note:"Máximo 2 días por semana"       },
  { id:"barra",        name:"Colgarse en barra",    emoji:"🏗️", color:"#00B4D8", twice:false, skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"10 min · descompresión columna" },
  { id:"huevos",       name:"8 Huevos",             emoji:"🥚", color:"#FFB703", twice:true,  skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"4 a la mañana · 4 a la noche"  },
  { id:"remolacha",    name:"Remolacha en polvo",   emoji:"🫐", color:"#C77DFF", twice:false, skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"10g · antes del entreno"        },
  { id:"sueno",        name:"7hs30 de sueño",       emoji:"😴", color:"#7B9EE8", twice:false, skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"Marcar al levantarte"           },
  { id:"agua",         name:"Agua",                 emoji:"🥤", color:"#48CAE4", twice:false, skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"3 litros diarios"               },
  { id:"camasolar",    name:"Cama solar",           emoji:"☀️", color:"#FFB703", twice:false, skipDays:[0,1,2,3,4,6], type:"goal",  maxPerWeek:null, weeklyTarget:null, note:"Solo los viernes"               },
  { id:"bici",         name:"Bicicleta estática",   emoji:"🚴", color:"#06D6A0", twice:false, skipDays:[],            type:"goal",  maxPerWeek:null, weeklyTarget:3,    note:"3 veces por semana · vos elegís los días" },
];

function toDateStr(date){
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}
function getLast7(){
  return Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d; });
}
function weekOf(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  d.setDate(d.getDate()-d.getDay());
  return toDateStr(d);
}
function isApplicable(habit,date){ return !habit.skipDays.includes(date.getDay()); }
function limitWeekCount(habitId,weekStart,logs){
  return Object.keys(logs).filter(k=>{
    const [hid,ds]=k.split("|");
    return hid===habitId&&ds&&weekOf(ds)===weekStart&&logs[k];
  }).length;
}
function weeklyGoalCount(habitId,weekStart,logs){
  return Object.keys(logs).filter(k=>{
    const parts=k.split("|");
    return parts[0]===habitId&&parts[1]&&parts.length===2&&weekOf(parts[1])===weekStart&&logs[k];
  }).length;
}
function isDone(habitId,dateStr,logs)        { return !!logs[`${habitId}|${dateStr}`]; }
function isTwiceDone(habitId,dateStr,s,logs) { return !!logs[`${habitId}|${dateStr}|${s}`]; }
function goalStreak(habitId,logs){
  let streak=0;
  const today=new Date();
  for(let i=0;i<=120;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ds=toDateStr(d);
    const h=HABITS.find(x=>x.id===habitId); if(!h) break;
    if(!isApplicable(h,d)) continue;
    if(h.twice){ if(logs[`${habitId}|${ds}|m`]&&logs[`${habitId}|${ds}|n`]) streak++; else if(i>0) break; }
    else{ if(logs[`${habitId}|${ds}`]) streak++; else if(i>0) break; }
  }
  return streak;
}

function App(){
  const [habits,setHabits]=useState(()=>{ try{ return JSON.parse(localStorage.getItem("hab-list-v6")||"null")||HABITS; }catch{ return HABITS; }});
  const [logs,  setLogs  ]=useState(()=>{ try{ return JSON.parse(localStorage.getItem("hab-logs-v3")||"{}"); }catch{ return {}; }});
  const [view,  setView  ]=useState("today");
  const [toast, setToast ]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newH,  setNewH  ]=useState({name:"",emoji:"⚡",type:"goal",twice:false,skipDays:[],maxPerWeek:2,color:"#00C9A7",note:""});

  const today   =new Date();
  const todayStr=toDateStr(today);
  const todayDow=today.getDay();
  const wkStart =weekOf(todayStr);
  const days7   =getLast7();

  useEffect(()=>{ try{ localStorage.setItem("hab-logs-v3",JSON.stringify(logs)); }catch{} },[logs]);
  useEffect(()=>{ try{ localStorage.setItem("hab-list-v6",JSON.stringify(habits)); }catch{} },[habits]);

  function flash(msg,ok=true){ setToast({msg,ok}); setTimeout(()=>setToast(null),2200); }
  function setLog(key,val){ setLogs(p=>({...p,[key]:val})); }

  function toggleSingle(habitId,dateStr){
    const h=habits.find(x=>x.id===habitId); if(!h) return;
    const key=`${habitId}|${dateStr}`;
    const next=!logs[key];
    if(h.type==="limit"&&next){
      const cnt=limitWeekCount(habitId,weekOf(dateStr),{...logs,[key]:true});
      if(cnt>h.maxPerWeek){ flash(`⚠ Límite: máx ${h.maxPerWeek} días/semana`,false); return; }
      flash("Registrado ✓");
    } else { flash(next?"Completado ✓":"Desmarcado"); }
    setLog(key,next);
  }
  function toggleTwice(habitId,dateStr,slot){
    const key=`${habitId}|${dateStr}|${slot}`;
    setLog(key,!logs[key]);
    flash(!logs[key]?(slot==="m"?"☀️ Mañana ✓":"🌙 Noche ✓"):"Desmarcado");
  }

  // daily progress (weeklyTarget habits: count as done if week goal met OR marked today)
  const applicableGoals=habits.filter(h=>h.type==="goal"&&isApplicable(h,today));
  const totalSlots=applicableGoals.reduce((a,h)=>a+(h.twice?2:1),0);
  const doneSlots=applicableGoals.reduce((a,h)=>{
    if(h.twice) return a+(logs[`${h.id}|${todayStr}|m`]?1:0)+(logs[`${h.id}|${todayStr}|n`]?1:0);
    if(h.weeklyTarget){ const wkc=weeklyGoalCount(h.id,wkStart,logs); return a+((wkc>=h.weeklyTarget||logs[`${h.id}|${todayStr}`])?1:0); }
    return a+(logs[`${h.id}|${todayStr}`]?1:0);
  },0);
  const pct=totalSlots>0?Math.round(doneSlots/totalSlots*100):0;
  const todaySkipped=habits.filter(h=>!isApplicable(h,today));

  const F = "'Barlow Condensed','DM Sans',sans-serif";
  const FB= "'DM Sans','Segoe UI',sans-serif";
  const inputSt={width:"100%",background:"#0A0F12",border:"1px solid #1A2530",borderRadius:8,padding:"10px 12px",color:"#E8F4F8",fontSize:14,boxSizing:"border-box",outline:"none",fontFamily:FB};

  const safeTop = "max(36px, calc(28px + env(safe-area-inset-top)))";
  const safeBotNav = "max(20px, env(safe-area-inset-bottom))";
  const safeBotContent = "max(84px, calc(84px + env(safe-area-inset-bottom)))";

  return (
    <div style={{fontFamily:FB,minHeight:"100vh",background:"#080D10",color:"#E8F4F8",maxWidth:430,margin:"0 auto",paddingBottom:safeBotContent}}>

      {/* ═══ HEADER ═══ */}
      <div style={{padding:`${safeTop} 20px 20px`,background:"linear-gradient(180deg,#0D1820 0%,#080D10 100%)"}}>
        <div style={{fontSize:10,letterSpacing:4,color:"#2A4A5A",textTransform:"uppercase",marginBottom:12,fontFamily:FB}}>
          {DAYS_FULL[todayDow]} · {today.getDate()} {MONTHS_ES[today.getMonth()]} {today.getFullYear()}
        </div>

        {/* ─ TITLE ─ */}
        <div style={{marginBottom:20,position:"relative"}}>
          <div style={{
            fontFamily:F,fontSize:52,fontWeight:900,letterSpacing:4,
            color:"#E8F4F8",textTransform:"uppercase",lineHeight:0.9,
            textShadow:"0 0 80px #00C9A730"
          }}>
            MIS<br/>
            <span style={{
              background:"linear-gradient(90deg, #00C9A7 0%, #48CAE4 60%, #00B4D880 100%)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"
            }}>HÁBITOS</span>
          </div>
          <div style={{
            width:56,height:3,marginTop:10,
            background:"linear-gradient(90deg,#00C9A7,transparent)",borderRadius:2
          }}/>
        </div>

        {/* progress card */}
        <div style={{display:"flex",alignItems:"center",gap:18,background:"#0D1820",borderRadius:16,padding:"16px 18px",border:"1px solid #1A2D3A"}}>
          <div style={{position:"relative",width:56,height:56,flexShrink:0}}>
            <svg width="56" height="56" style={{transform:"rotate(-90deg)"}}>
              <circle cx="28" cy="28" r="23" fill="none" stroke="#1A2D3A" strokeWidth="5"/>
              <circle cx="28" cy="28" r="23" fill="none" stroke={pct===100?"#00C9A7":"#00B4D8"} strokeWidth="5"
                strokeDasharray={`${2*Math.PI*23}`}
                strokeDashoffset={`${2*Math.PI*23*(1-pct/100)}`}
                strokeLinecap="round" style={{transition:"stroke-dashoffset .5s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#00C9A7",fontFamily:F}}>{pct}%</div>
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:pct===100?"#00C9A7":"#E8F4F8",fontFamily:F,letterSpacing:1}}>
              {pct===100?"¡DÍA COMPLETO! 🔥":pct>=50?"VAS BIEN, SEGUÍ":"EMPECEMOS"}
            </div>
            <div style={{fontSize:12,color:"#3A6070",marginTop:3,fontFamily:FB}}>{doneSlots} de {totalSlots} completados hoy</div>
          </div>
        </div>
      </div>

      {/* ═══ NAV ═══ */}
      <div style={{display:"flex",borderBottom:"1px solid #1A2530",padding:"0 20px",background:"#0A0F14"}}>
        {[["today","Hoy"],["week","Semana"],["manage","Editar"]].map(([v,label])=>(
          <button key={v} onClick={()=>setView(v)} style={{
            flex:1,background:"none",border:"none",
            borderBottom:`2px solid ${view===v?"#00C9A7":"transparent"}`,
            color:view===v?"#00C9A7":"#2A4A5A",padding:"13px 4px",cursor:"pointer",
            fontSize:13,fontWeight:view===v?700:400,transition:"all .2s",marginBottom:-1,fontFamily:FB
          }}>{label}</button>
        ))}
      </div>

      {/* ═══════════ TODAY ═══════════ */}
      {view==="today"&&(
        <div style={{padding:"16px"}}>
          {habits.map(habit=>{
            if(!isApplicable(habit,today)) return null;
            const singleDone=!habit.twice&&isDone(habit.id,todayStr,logs);
            const mDone=habit.twice&&isTwiceDone(habit.id,todayStr,"m",logs);
            const nDone=habit.twice&&isTwiceDone(habit.id,todayStr,"n",logs);
            const fullDone=habit.twice?(mDone&&nDone):singleDone;
            const halfDone=habit.twice&&(mDone||nDone)&&!(mDone&&nDone);
            const wkCnt=habit.type==="limit"?limitWeekCount(habit.id,wkStart,logs):0;
            const overLimit=habit.type==="limit"&&wkCnt>habit.maxPerWeek;
            const streak=habit.type==="goal"&&!habit.twice&&!habit.weeklyTarget?goalStreak(habit.id,logs):0;
            const wkGoalCnt=habit.weeklyTarget?weeklyGoalCount(habit.id,wkStart,logs):0;
            const weeklyMet=!!(habit.weeklyTarget&&wkGoalCnt>=habit.weeklyTarget);
            const lit=fullDone||halfDone||weeklyMet;
            const ac=overLimit?"#EF476F":habit.color;

            return (
              <div key={habit.id} style={{
                background:"#0D1820",
                border:`1px solid ${lit?ac+"55":"#1A2D3A"}`,
                borderRadius:16,padding:"16px",marginBottom:10,
                boxShadow:lit?`0 0 24px ${ac}18`:"none",transition:"all .25s"
              }}>
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:habit.twice?12:0}}>
                  <div style={{
                    width:46,height:46,borderRadius:12,flexShrink:0,
                    background:lit?ac+"20":"#111820",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,
                    border:`1px solid ${lit?ac+"55":"#1A2D3A"}`,transition:"all .2s"
                  }}>{habit.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:2,fontFamily:FB}}>{habit.name}</div>
                    <div style={{fontSize:11,color:"#3A6070",fontFamily:FB}}>{habit.note}</div>
                  </div>
                  {habit.type==="limit"&&(
                    <div style={{
                      fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,fontFamily:FB,
                      background:overLimit?"#EF476F22":"#111820",
                      color:overLimit?"#EF476F":wkCnt>=habit.maxPerWeek?"#FFB703":"#3A6070",
                      border:`1px solid ${overLimit?"#EF476F44":"#1A2D3A"}`
                    }}>{wkCnt}/{habit.maxPerWeek}</div>
                  )}
                  {habit.weeklyTarget&&(
                    <div style={{
                      fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,fontFamily:FB,
                      background:weeklyMet?ac+"22":"#111820",
                      color:weeklyMet?ac:"#3A6070",
                      border:`1px solid ${weeklyMet?ac+"44":"#1A2D3A"}`
                    }}>{wkGoalCnt}/{habit.weeklyTarget} sem</div>
                  )}
                  {habit.type==="goal"&&!habit.twice&&!habit.weeklyTarget&&streak>1&&(
                    <div style={{fontSize:11,color:"#3A6070",fontFamily:FB}}>🔥{streak}d</div>
                  )}
                </div>

                {habit.twice&&(
                  <div style={{display:"flex",gap:8}}>
                    {[["m","☀️ Mañana",mDone],["n","🌙 Noche",nDone]].map(([slot,label,done])=>(
                      <button key={slot} onClick={()=>toggleTwice(habit.id,todayStr,slot)} style={{
                        flex:1,padding:"10px 8px",borderRadius:10,cursor:"pointer",
                        background:done?ac+"22":"#111820",
                        border:`1px solid ${done?ac+"66":"#1A2D3A"}`,
                        color:done?ac:"#3A6070",fontSize:13,fontWeight:600,
                        transition:"all .2s",fontFamily:FB
                      }}>{label}{done?" ✓":""}</button>
                    ))}
                  </div>
                )}

                {!habit.twice&&(
                  <button onClick={()=>toggleSingle(habit.id,todayStr)} style={{
                    width:"100%",marginTop:12,padding:"10px",borderRadius:10,cursor:"pointer",
                    background:(singleDone||weeklyMet)?ac+"22":"#111820",
                    border:`1px solid ${(singleDone||weeklyMet)?ac+"66":"#1A2D3A"}`,
                    color:(singleDone||weeklyMet)?ac:"#3A6070",
                    fontSize:13,fontWeight:600,transition:"all .2s",fontFamily:FB
                  }}>
                    {habit.type==="limit"
                      ?(singleDone?"✓ Registrado — toca para desmarcar":"Registrar para hoy")
                      :habit.weeklyTarget
                        ?(weeklyMet&&!singleDone?"✓ Meta semanal cumplida":singleDone?"✓ Hecho hoy — toca para desmarcar":"Marcar como hecho")
                        :(singleDone?"✓ Completado — toca para desmarcar":"Marcar como hecho")}
                  </button>
                )}
              </div>
            );
          })}

          {todaySkipped.length>0&&(
            <div style={{marginTop:18}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#1A2D3A",textTransform:"uppercase",marginBottom:8,fontFamily:FB}}>No aplica hoy</div>
              {todaySkipped.map(h=>(
                <div key={h.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:"#0A0F14",border:"1px solid #111820",borderRadius:12,marginBottom:7,opacity:0.45}}>
                  <span style={{fontSize:18}}>{h.emoji}</span>
                  <span style={{fontSize:13,color:"#2A4A5A",fontFamily:FB}}>{h.name}</span>
                  <span style={{marginLeft:"auto",fontSize:11,color:"#1A2D3A",fontFamily:FB}}>{h.note}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ═══════════ WEEK ═══════════ */}
      {view==="week"&&(
        <div style={{padding:"16px"}}>
          <div style={{overflowX:"auto"}}>
            {/* day headers */}
            <div style={{display:"grid",gridTemplateColumns:"108px repeat(7,1fr)",gap:3,marginBottom:10,minWidth:360}}>
              <div/>
              {days7.map((d,i)=>{
                const isToday=toDateStr(d)===todayStr;
                return(
                  <div key={i} style={{textAlign:"center"}}>
                    <div style={{fontSize:9,letterSpacing:1,color:isToday?"#E8F4F8":"#2A4A5A",fontWeight:700,textTransform:"uppercase",fontFamily:FB}}>{DAYS_ES[d.getDay()]}</div>
                    <div style={{
                      width:26,height:26,borderRadius:"50%",margin:"3px auto 0",
                      background:isToday?"#00C9A722":"transparent",
                      border:isToday?"1px solid #00C9A755":"1px solid transparent",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:11,color:isToday?"#00C9A7":"#3A6070",fontWeight:600,fontFamily:FB
                    }}>{d.getDate()}</div>
                  </div>
                );
              })}
            </div>

            {/* habit rows */}
            {habits.map(habit=>(
              <div key={habit.id} style={{display:"grid",gridTemplateColumns:"108px repeat(7,1fr)",gap:3,marginBottom:5,alignItems:"center",minWidth:360}}>
                <div style={{fontSize:11,color:"#3A6070",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",paddingRight:4,fontFamily:FB}}>
                  {habit.emoji} {habit.name}
                </div>
                {days7.map((d,i)=>{
                  const ds=toDateStr(d);
                  if(!isApplicable(habit,d)) return(
                    <div key={i} style={{height:34,borderRadius:8,background:"#080D10",border:"1px solid #111820",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#1A2D3A"}}>—</div>
                  );
                  if(habit.twice){
                    const m=isTwiceDone(habit.id,ds,"m",logs);
                    const n=isTwiceDone(habit.id,ds,"n",logs);
                    return(
                      <div key={i} style={{height:34,borderRadius:8,overflow:"hidden",display:"flex",flexDirection:"column",gap:1,cursor:"pointer",border:`1px solid ${(m||n)?habit.color+"55":"#1A2D3A"}`}}
                        onClick={()=>{
                          if(!m&&!n){ setLog(`${habit.id}|${ds}|m`,true); flash("Mañana ✓"); }
                          else if(m&&!n){ setLog(`${habit.id}|${ds}|n`,true); flash("Noche ✓"); }
                          else{ setLog(`${habit.id}|${ds}|m`,false); setLog(`${habit.id}|${ds}|n`,false); flash("Desmarcado"); }
                        }}>
                        <div style={{flex:1,background:m?habit.color+"50":"#111820",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}>
                          <span style={{fontSize:8,color:m?habit.color:"#1A2D3A"}}>☀</span>
                        </div>
                        <div style={{flex:1,background:n?habit.color+"50":"#111820",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}>
                          <span style={{fontSize:8,color:n?habit.color:"#1A2D3A"}}>🌙</span>
                        </div>
                      </div>
                    );
                  }
                  const done=isDone(habit.id,ds,logs);
                  return(
                    <div key={i} onClick={()=>{
                      if(habit.type==="limit"){
                        const next=!done;
                        if(next){
                          const cnt=limitWeekCount(habit.id,weekOf(ds),{...logs,[`${habit.id}|${ds}`]:true});
                          if(cnt>habit.maxPerWeek){ flash(`⚠ Límite: máx ${habit.maxPerWeek} días/semana`,false); return; }
                        }
                        setLog(`${habit.id}|${ds}`,next); flash(next?"Registrado ✓":"Desmarcado");
                      } else { setLog(`${habit.id}|${ds}`,!done); flash(!done?"✓":"Desmarcado"); }
                    }} style={{
                      height:34,borderRadius:8,cursor:"pointer",
                      background:done?habit.color+"40":"#111820",
                      border:`1px solid ${done?habit.color+"66":"#1A2D3A"}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:14,color:done?habit.color:"#1A2D3A",fontWeight:700,
                      transition:"all .15s"
                    }}>{done?"✓":""}</div>
                  );
                })}
              </div>
            ))}
          </div>

          {/* summary bars */}
          <div style={{marginTop:24,borderTop:"1px solid #1A2D3A",paddingTop:20}}>
            <div style={{fontSize:10,letterSpacing:3,color:"#2A4A5A",textTransform:"uppercase",marginBottom:14,fontFamily:FB}}>Resumen semanal</div>
            {habits.map(habit=>{
              if(habit.twice){
                const appl=days7.filter(d=>isApplicable(habit,d));
                const target=appl.length*2;
                const done=appl.reduce((a,d)=>{
                  const ds=toDateStr(d);
                  return a+(logs[`${habit.id}|${ds}|m`]?1:0)+(logs[`${habit.id}|${ds}|n`]?1:0);
                },0);
                const p=target>0?Math.min(done/target,1):0;
                return(<div key={habit.id} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5,fontFamily:FB}}>
                    <span style={{color:"#3A6070"}}>{habit.emoji} {habit.name}</span>
                    <span style={{color:p===1?habit.color:"#2A4A5A"}}>{done}/{target} turnos</span>
                  </div>
                  <div style={{height:4,background:"#111820",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${p*100}%`,background:habit.color,borderRadius:4,transition:"width .3s"}}/>
                  </div>
                </div>);
              }
              if(habit.type==="limit"){
                const cnt=limitWeekCount(habit.id,wkStart,logs);
                const over=cnt>habit.maxPerWeek;
                return(<div key={habit.id} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5,fontFamily:FB}}>
                    <span style={{color:"#3A6070"}}>{habit.emoji} {habit.name}</span>
                    <span style={{color:over?"#EF476F":"#2A4A5A"}}>{cnt}/{habit.maxPerWeek} máx {over?"⚠":""}</span>
                  </div>
                  <div style={{height:4,background:"#111820",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(cnt/habit.maxPerWeek,1)*100}%`,background:over?"#EF476F":habit.color,borderRadius:4,transition:"width .3s"}}/>
                  </div>
                </div>);
              }
              if(habit.weeklyTarget){
                const cnt=weeklyGoalCount(habit.id,wkStart,logs);
                const p=Math.min(cnt/habit.weeklyTarget,1);
                const met=cnt>=habit.weeklyTarget;
                return(<div key={habit.id} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5,fontFamily:FB}}>
                    <span style={{color:"#3A6070"}}>{habit.emoji} {habit.name}</span>
                    <span style={{color:met?habit.color:"#2A4A5A"}}>{cnt}/{habit.weeklyTarget} veces {met?"✓":""}</span>
                  </div>
                  <div style={{height:4,background:"#111820",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${p*100}%`,background:habit.color,borderRadius:4,transition:"width .3s"}}/>
                  </div>
                </div>);
              }
              const appl=days7.filter(d=>isApplicable(habit,d));
              const target=appl.length;
              const done=appl.filter(d=>logs[`${habit.id}|${toDateStr(d)}`]).length;
              const p=target>0?done/target:0;
              return(<div key={habit.id} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5,fontFamily:FB}}>
                  <span style={{color:"#3A6070"}}>{habit.emoji} {habit.name}</span>
                  <span style={{color:p===1?habit.color:"#2A4A5A"}}>{done}/{target} días</span>
                </div>
                <div style={{height:4,background:"#111820",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${p*100}%`,background:habit.color,borderRadius:4,transition:"width .3s"}}/>
                </div>
              </div>);
            })}
          </div>
        </div>
      )}

      {/* ═══════════ MANAGE ═══════════ */}
      {view==="manage"&&(
        <div style={{padding:"16px"}}>
          {habits.map(h=>(
            <div key={h.id} style={{
              background:"#0D1820",border:"1px solid #1A2D3A",
              borderLeft:`3px solid ${h.type==="goal"?h.color:"#EF476F"}`,
              borderRadius:12,padding:"13px 16px",marginBottom:9,display:"flex",alignItems:"center",gap:12
            }}>
              <span style={{fontSize:20}}>{h.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,fontFamily:FB}}>{h.name}</div>
                <div style={{fontSize:11,color:"#3A6070",marginTop:2,fontFamily:FB}}>{h.note}</div>
              </div>
              <div style={{
                fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:10,letterSpacing:1,
                background:h.type==="goal"?"#001A14":"#1A0810",
                color:h.type==="goal"?"#00C9A7":"#EF476F",
                border:`1px solid ${h.type==="goal"?"#00C9A733":"#EF476F33"}`,
                fontFamily:FB
              }}>{h.type==="goal"?"META":"LÍMITE"}</div>
              <button onClick={()=>setHabits(p=>p.filter(x=>x.id!==h.id))}
                style={{background:"none",border:"none",color:"#1A2D3A",cursor:"pointer",fontSize:20,lineHeight:1,padding:4}}>×</button>
            </div>
          ))}

          {!showAdd?(
            <button onClick={()=>setShowAdd(true)} style={{
              width:"100%",background:"#0D1820",border:"2px dashed #1A2D3A",
              borderRadius:12,padding:18,color:"#2A4A5A",cursor:"pointer",fontSize:14,marginTop:4,fontFamily:FB
            }}>+ Agregar hábito</button>
          ):(
            <div style={{background:"#0D1820",border:"1px solid #1A2D3A",borderRadius:14,padding:"20px 16px",marginTop:4}}>
              <div style={{fontWeight:700,marginBottom:16,fontSize:15,color:"#00C9A7",fontFamily:F,letterSpacing:1}}>NUEVO HÁBITO</div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,color:"#2A4A5A",display:"block",marginBottom:4,letterSpacing:2,fontFamily:FB}}>EMOJI</label>
                <input value={newH.emoji} onChange={e=>setNewH(p=>({...p,emoji:e.target.value}))} style={{...inputSt,width:60,fontSize:22,textAlign:"center",padding:8}}/>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:10,color:"#2A4A5A",display:"block",marginBottom:4,letterSpacing:2,fontFamily:FB}}>NOMBRE</label>
                <input placeholder="Ej: Meditar..." value={newH.name} onChange={e=>setNewH(p=>({...p,name:e.target.value}))} style={inputSt}/>
              </div>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:10,color:"#2A4A5A",display:"block",marginBottom:4,letterSpacing:2,fontFamily:FB}}>NOTA</label>
                <input placeholder="Ej: Antes de dormir" value={newH.note} onChange={e=>setNewH(p=>({...p,note:e.target.value}))} style={inputSt}/>
              </div>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:10,color:"#2A4A5A",display:"block",marginBottom:4,letterSpacing:2,fontFamily:FB}}>TIPO</label>
                <div style={{display:"flex",gap:8}}>
                  {[["goal","✓ Meta"],["limit","✕ Límite"]].map(([v,label])=>(
                    <button key={v} onClick={()=>setNewH(p=>({...p,type:v}))} style={{
                      flex:1,padding:"10px 4px",borderRadius:10,cursor:"pointer",
                      border:`1px solid ${newH.type===v?(v==="goal"?"#00C9A7":"#EF476F"):"#1A2D3A"}`,
                      background:newH.type===v?(v==="goal"?"#001A14":"#1A0810"):"#0A0F14",
                      color:newH.type===v?(v==="goal"?"#00C9A7":"#EF476F"):"#2A4A5A",
                      fontSize:13,fontWeight:600,fontFamily:FB
                    }}>{label}</button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:10,color:"#2A4A5A",display:"block",marginBottom:4,letterSpacing:2,fontFamily:FB}}>¿DOS VECES AL DÍA?</label>
                <div style={{display:"flex",gap:8}}>
                  {[[false,"No"],[true,"Sí (mañana y noche)"]].map(([v,label])=>(
                    <button key={String(v)} onClick={()=>setNewH(p=>({...p,twice:v}))} style={{
                      flex:1,padding:"10px 4px",borderRadius:10,cursor:"pointer",
                      border:`1px solid ${newH.twice===v?"#00C9A7":"#1A2D3A"}`,
                      background:newH.twice===v?"#001A14":"#0A0F14",
                      color:newH.twice===v?"#00C9A7":"#2A4A5A",fontSize:13,fontWeight:500,fontFamily:FB
                    }}>{label}</button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:18}}>
                <label style={{fontSize:10,color:"#2A4A5A",display:"block",marginBottom:4,letterSpacing:2,fontFamily:FB}}>COLOR</label>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["#00C9A7","#00B4D8","#48CAE4","#FFB703","#EF476F","#C77DFF","#06D6A0","#90E0EF"].map(c=>(
                    <button key={c} onClick={()=>setNewH(p=>({...p,color:c}))} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:`3px solid ${newH.color===c?"#E8F4F8":"transparent"}`}}/>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setShowAdd(false)} style={{flex:1,background:"#111820",border:"none",borderRadius:10,padding:12,color:"#2A4A5A",cursor:"pointer",fontSize:14,fontFamily:FB}}>Cancelar</button>
                <button onClick={()=>{
                  if(!newH.name.trim()) return;
                  setHabits(p=>[...p,{...newH,id:"custom_"+Date.now(),skipDays:[],weeklyTarget:null,maxPerWeek:newH.type==="limit"?newH.maxPerWeek:null}]);
                  setNewH({name:"",emoji:"⚡",type:"goal",twice:false,skipDays:[],maxPerWeek:2,color:"#00C9A7",note:""});
                  setShowAdd(false); flash("¡Hábito agregado!");
                }} style={{flex:2,background:"#001A14",border:"1px solid #00C9A755",borderRadius:10,padding:12,color:"#00C9A7",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:FB}}>Agregar</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ═══ TOAST ═══ */}
      {toast&&(
        <div style={{
          position:"fixed",bottom:"calc(90px + env(safe-area-inset-bottom))",left:"50%",transform:"translateX(-50%)",
          background:toast.ok?"#001A14":"#1A0810",
          border:`1px solid ${toast.ok?"#00C9A755":"#EF476F55"}`,
          color:toast.ok?"#00C9A7":"#EF476F",
          padding:"10px 22px",borderRadius:24,fontSize:13,fontWeight:600,
          whiteSpace:"nowrap",zIndex:200,boxShadow:"0 8px 30px #00000090",fontFamily:FB
        }}>{toast.msg}</div>
      )}

      {/* ═══ BOTTOM NAV ═══ */}
      <div style={{
        position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:"100%",maxWidth:430,background:"#0A0F14",
        borderTop:"1px solid #1A2530",
        paddingTop:10,paddingBottom:safeBotNav,
        display:"flex",justifyContent:"space-around"
      }}>
        {[["today","📅","Hoy"],["week","📊","Semana"],["manage","⚙️","Editar"]].map(([v,icon,label])=>(
          <button key={v} onClick={()=>setView(v)} style={{
            background:"none",border:"none",cursor:"pointer",
            color:view===v?"#00C9A7":"#1A2D3A",
            display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 24px"
          }}>
            <span style={{fontSize:22}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:view===v?700:400,fontFamily:FB}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
